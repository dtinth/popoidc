name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.1

      - name: Install age (interop tests decrypt with the real binary)
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check .

      - name: Test (coverage + junit + log)
        run: |
          mkdir -p site
          NO_COLOR=1 deno test -A --coverage=coverage --junit-path=site/junit.xml 2>&1 | tee site/tests.txt

      - name: Coverage report (HTML)
        run: |
          deno coverage coverage --html --exclude='(_test|testutil)\.ts$'
          cp -r coverage/html site/coverage

      - name: Assemble Pages report
        run: deno run --allow-read --allow-write scripts/report.ts

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
